services:
  - type: web
    name: lassonde-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SHOPIFY_STORE_URL
        value: lassonde-wagyu-test.myshopify.com
      - key: SHOPIFY_API_VERSION
        value: "2026-04"
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false        # à entrer manuellement dans le dashboard Render
      - key: ANTHROPIC_API_KEY
        sync: false        # à entrer manuellement dans le dashboard Render
