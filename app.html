<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Scanner · Lassonde</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#c8a96e;--bg:#0a0a0a;--surface:#111;--border:#222;
  --text:#f0ebe0;--muted:#666;--red:#c0392b;--green:#27ae60;--orange:#e67e22;
  --radius:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}

/* ── HEADER ── */
#header{padding:14px 20px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  background:linear-gradient(to bottom,#0f0f0f,var(--bg))}
#header-name{font-size:17px;font-weight:normal;letter-spacing:.06em;color:var(--gold);
  text-shadow:0 0 20px rgba(200,169,110,.3)}
#session-counter{font-family:sans-serif;font-size:12px;color:var(--muted);text-align:right}
#cnt-main{color:var(--text);font-size:14px;display:block}

/* ── TABS ── */
#tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;display:flex;background:var(--surface);
  border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:10px 0 14px;display:flex;flex-direction:column;
  align-items:center;gap:3px;cursor:pointer;font-family:sans-serif;
  font-size:10px;color:var(--muted);transition:color .25s;border:none;background:none;
  position:relative}
.tab::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:2px;background:var(--gold);border-radius:0 0 2px 2px;
  transition:width .3s cubic-bezier(.4,0,.2,1)}
.tab.active{color:var(--gold)}
.tab.active::after{width:32px}
.tab-icon{font-size:20px;line-height:1;transition:transform .2s}
.tab.active .tab-icon{transform:scale(1.12)}

/* ── PANELS ── */
#content{flex:1;overflow:hidden;position:relative}
.panel{display:none;height:100%;overflow:hidden;flex-direction:column}
.panel.active{display:flex}

/* ════════════════════
   SCANNER
════════════════════ */
#panel-scanner{background:var(--bg)}

/* VIEW: IDLE */
#view-idle{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:24px;padding:40px 24px}
#btn-camera{width:148px;height:148px;border-radius:50%;background:var(--surface);
  border:2px solid var(--gold);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;cursor:pointer;
  transition:transform .15s,background .2s,box-shadow .3s;position:relative;
  box-shadow:0 0 0 0 rgba(200,169,110,.4)}
#btn-camera::before,#btn-camera::after{content:'';position:absolute;inset:-2px;
  border-radius:50%;border:2px solid var(--gold);opacity:0;
  animation:pulse-ring 2.4s ease-out infinite;pointer-events:none}
#btn-camera::after{animation-delay:1.2s}
@keyframes pulse-ring{
  0%{transform:scale(1);opacity:.5}
  100%{transform:scale(1.55);opacity:0}
}
#btn-camera:active{transform:scale(.93);background:#1a1408;
  box-shadow:0 0 24px rgba(200,169,110,.3)}
#btn-camera-icon{font-size:52px;line-height:1}
#btn-camera-label{font-family:sans-serif;font-size:12px;color:var(--muted);text-align:center}
#btn-upload{background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--gold);font-family:sans-serif;font-size:13px;cursor:pointer;padding:9px 20px}

/* VIEW: ANALYZING */
#view-analyzing{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:20px;padding:24px}
#analyze-preview{width:100%;max-height:260px;object-fit:cover;
  border-radius:10px;border:1px solid var(--border)}
#analyze-status{font-family:sans-serif;font-size:14px;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:16px}
#analyze-status span{letter-spacing:.04em;font-size:13px}
/* Wave dots spinner */
.wave-dots{display:flex;align-items:center;gap:7px}
.wave-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);
  animation:wave-bounce 1.3s ease-in-out infinite}
.wave-dot:nth-child(2){animation-delay:.16s}
.wave-dot:nth-child(3){animation-delay:.32s}
@keyframes wave-bounce{
  0%,60%,100%{transform:translateY(0);opacity:.6}
  30%{transform:translateY(-14px);opacity:1}
}
/* Fallback simple spinner */
.spinner{width:20px;height:20px;border:2px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* VIEW: FORM */
#view-form{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 16px 120px;display:flex;flex-direction:column}
#form-photo{width:100%;height:130px;object-fit:cover;
  border-radius:12px;border:1px solid var(--border);margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.4)}

/* Halal badge */
#halal-badge{display:flex;align-items:center;justify-content:center;gap:6px;
  margin-bottom:12px}
#halal-badge-inner{display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:20px;font-family:sans-serif;font-size:11px;
  font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  background:linear-gradient(135deg,#1a1200,#2a1e00);
  border:1px solid rgba(200,169,110,.4);color:var(--gold);
  position:relative;overflow:hidden}
#halal-badge-inner::after{content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(200,169,110,.15) 50%,transparent 60%);
  animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}

#dup-badge{text-align:center;margin-bottom:10px;display:none}
#dup-badge span{background:var(--gold);color:var(--bg);border-radius:20px;
  padding:4px 16px;font-family:sans-serif;font-size:12px;display:inline-block;
  box-shadow:0 2px 10px rgba(200,169,110,.3)}

/* Result card grouping */
.card-group{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px;margin-bottom:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.3)}
.card-group-title{font-family:sans-serif;font-size:10px;text-transform:uppercase;
  letter-spacing:.1em;color:var(--gold);margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--border)}
.card-group .field{margin-bottom:8px}
.card-group .field:last-child{margin-bottom:0}

.field{margin-bottom:11px}
.field label{font-family:sans-serif;font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.field input{width:100%;padding:11px 14px;background:var(--bg);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-family:Georgia,serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,110,.1)}
.field input.missing{border-color:var(--orange);background:#120d00;
  box-shadow:0 0 0 3px rgba(230,126,34,.1)}
.field input.missing::placeholder{color:var(--orange)}

/* IDLE STATUS */
#idle-status{font-family:sans-serif;font-size:12px;color:var(--muted);
  text-align:center;padding:0 24px;min-height:18px;transition:color .3s}
#idle-status.ready{color:var(--green)}
#idle-status.illisible{color:var(--orange)}

/* CAM FLASH */
#cam-flash{position:fixed;inset:0;background:#fff;z-index:400;
  opacity:0;pointer-events:none;transition:opacity .25s}

/* SCAN HINT */
#scan-hint{background:#120d00;border:1px solid var(--orange);border-radius:8px;
  padding:10px 14px;font-family:sans-serif;font-size:12px;color:var(--orange);
  line-height:1.5;margin-bottom:10px;display:none}
#scan-retry-btns{display:none;gap:8px;margin-bottom:12px}
#scan-retry-btns button{flex:1;padding:9px 8px;background:none;
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-family:sans-serif;font-size:12px;cursor:pointer}
#btn-retake{color:var(--gold)!important;border-color:var(--gold)!important}

/* MÊME COUPE — petit lien dans le form */
#lien-meme-coupe{display:block;text-align:center;margin-bottom:10px;
  font-family:sans-serif;font-size:11px;color:var(--muted);
  cursor:pointer;text-decoration:underline;text-underline-offset:3px}

/* FORM ACTIONS BAR — 3 boutons */
#form-actions{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;padding:10px 16px;
  background:linear-gradient(to top,var(--bg) 80%,transparent);
  display:flex;gap:8px;z-index:50;display:none}
#btn-restart{flex:1;padding:11px 6px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;color:var(--muted);font-family:Georgia,serif;font-size:12px;
  letter-spacing:.4px;text-transform:uppercase;cursor:pointer;transition:all .2s}
#btn-restart:active{opacity:.7;transform:scale(.97)}
#btn-correct{flex:1;padding:11px 6px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;color:var(--muted);font-family:Georgia,serif;font-size:12px;
  letter-spacing:.4px;text-transform:uppercase;cursor:pointer;transition:all .2s}
#btn-correct:active{opacity:.7;transform:scale(.97)}
#btn-confirm{flex:1;padding:11px 6px;
  background:linear-gradient(135deg,#d4b87a,var(--gold),#b8952a);
  border:none;border-radius:10px;color:var(--bg);font-family:Georgia,serif;font-size:12px;
  letter-spacing:.4px;text-transform:uppercase;cursor:pointer;font-weight:bold;
  box-shadow:0 4px 16px rgba(200,169,110,.35);transition:all .2s}
#btn-confirm:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
#btn-confirm:active{opacity:.9;transform:scale(.97);box-shadow:0 2px 8px rgba(200,169,110,.2)}

/* MODAL: même coupe */
#modal-dup{display:none;position:fixed;inset:0;background:#000a;z-index:200;
  align-items:center;justify-content:center}
#modal-dup.show{display:flex}
#modal-inner{background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:28px 24px;width:280px;text-align:center}
#modal-inner h3{font-size:16px;margin-bottom:6px;color:var(--gold)}
#modal-inner p{font-family:sans-serif;font-size:13px;color:var(--muted);margin-bottom:20px}
#dup-count-input{width:80px;text-align:center;padding:10px;font-size:28px;
  font-family:Georgia,serif;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--text);outline:none;display:block;margin:0 auto 20px}
#modal-btns{display:flex;gap:10px}
#btn-dup-cancel{flex:1;padding:12px;background:none;border:1px solid var(--border);
  border-radius:8px;color:var(--muted);cursor:pointer;font-size:14px}
#btn-dup-ok{flex:2;padding:12px;background:var(--gold);border:none;border-radius:8px;
  color:var(--bg);cursor:pointer;font-size:14px;font-family:Georgia,serif}

/* ════════════════════
   STOCK
════════════════════ */
#panel-stock{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px;padding-bottom:80px}
#stock-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
#stock-title{font-size:16px}
#btn-refresh{background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--gold);padding:6px 12px;font-family:sans-serif;font-size:12px;cursor:pointer}
.stock-section{margin-bottom:20px}
.stock-section-title{font-family:sans-serif;font-size:11px;text-transform:uppercase;
  letter-spacing:.1em;color:var(--gold);margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid var(--border)}
.stock-item{background:var(--surface);border-radius:10px;padding:12px 14px;
  margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;
  border:1px solid var(--border);transition:border-color .2s}
.stock-item:active{border-color:var(--gold)}
.stock-item-name{font-size:14px;margin-bottom:3px}
.stock-item-sku{font-size:10px;color:var(--muted);font-family:sans-serif}
.stock-item-price{font-size:14px;color:var(--gold)}
.stock-badge{display:inline-block;padding:2px 7px;border-radius:4px;
  font-family:sans-serif;font-size:10px;font-weight:bold;margin-top:3px}
.badge-ok{background:#1a3a2a;color:var(--green)}
.badge-zero{background:#3a1a1a;color:var(--red)}

/* ════════════════════
   AGENT
════════════════════ */
#panel-agent{padding:16px;padding-bottom:80px;display:flex;flex-direction:column;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
#chat-messages{flex:1;display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;
  animation:msg-in .25s ease-out both}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;
  background:linear-gradient(135deg,#d4b87a,var(--gold));
  color:var(--bg);border-radius:14px 14px 3px 14px;
  box-shadow:0 3px 12px rgba(200,169,110,.25)}
.msg.agent{align-self:flex-start;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px 14px 14px 3px;
  box-shadow:0 2px 8px rgba(0,0,0,.2)}
.msg.system{align-self:center;background:transparent;color:var(--muted);font-size:11px;
  font-family:sans-serif;border:1px solid #1e1e1e;border-radius:8px;padding:6px 12px;
  letter-spacing:.04em}
/* Web search badge */
.web-badge{display:inline-flex;align-items:center;gap:4px;font-family:sans-serif;
  font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:4px;
  padding:2px 7px;margin-top:6px}
/* Typing indicator */
.typing-indicator{display:flex;align-items:center;gap:5px;padding:12px 14px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 14px 3px;
  align-self:flex-start;max-width:72px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);
  animation:wave-bounce 1.3s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.16s}
.typing-dot:nth-child(3){animation-delay:.32s}
#chat-input-wrap{position:sticky;bottom:0;background:var(--bg);
  padding-top:10px;flex-shrink:0}
#chat-form{display:flex;gap:8px;align-items:flex-end}
#chat-input{flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;color:var(--text);font-family:Georgia,serif;
  font-size:14px;resize:none;max-height:100px;outline:none;line-height:1.4;
  transition:border-color .2s,box-shadow .2s}
#chat-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,110,.1)}
#btn-send{width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,#d4b87a,var(--gold));
  border:none;color:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(200,169,110,.3);
  transition:all .2s}
#btn-send:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
#btn-send:active{transform:scale(.92)}

/* ── UTILITAIRES ── */
#loader{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);z-index:300;
  align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loader.visible{display:flex}
.loader-spinner{display:flex;gap:8px;align-items:center}
.loader-spinner::before,.loader-spinner::after,
.loader-spinner span{content:'';display:block;width:11px;height:11px;border-radius:50%;
  background:var(--gold);animation:wave-bounce 1.3s ease-in-out infinite}
.loader-spinner::after{animation-delay:.16s}
.loader-spinner span{animation-delay:.32s}
.loader-text{font-family:sans-serif;font-size:13px;color:var(--muted);letter-spacing:.04em}
#toast{position:fixed;bottom:84px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--gold);border-radius:10px;
  padding:11px 18px;font-family:sans-serif;font-size:13px;
  white-space:nowrap;z-index:400;opacity:0;
  transition:opacity .3s,transform .3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;max-width:90%;
  box-shadow:0 6px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);
  font-family:sans-serif;font-size:13px}
.empty-state div{font-size:32px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <span id="header-name">Scanner</span>
    <div id="session-counter">
      <strong id="cnt-main">0 sac</strong>
      <span id="cnt-total"></span>
    </div>
  </div>

  <div id="content">

    <!-- ══ SCANNER ══ -->
    <div id="panel-scanner" class="panel active">

      <!-- Vue 1 : accueil -->
      <div id="view-idle">
        <button id="btn-camera">
          <div id="btn-camera-icon">📷</div>
          <div id="btn-camera-label">Appuyer pour<br>scanner</div>
        </button>
        <div id="idle-status"></div>
        <button id="btn-upload">Charger une photo</button>
      </div>

      <!-- Vue 2 : analyse en cours -->
      <div id="view-analyzing" style="display:none">
        <img id="analyze-preview" src="" alt="">
        <div id="analyze-status">
          <div class="wave-dots">
            <div class="wave-dot"></div>
            <div class="wave-dot"></div>
            <div class="wave-dot"></div>
          </div>
          <span>Analyse Claude Vision…</span>
        </div>
      </div>

      <!-- Vue 3 : formulaire éditable -->
      <div id="view-form" style="display:none">
        <img id="form-photo" src="" alt="">
        <!-- Badge Halal certifié -->
        <div id="halal-badge">
          <div id="halal-badge-inner">
            <span>☪</span> Halal · FAMBRAS certifié
          </div>
        </div>
        <div id="scan-hint"></div>
        <div id="scan-retry-btns">
          <button id="btn-retake">↺ Reprendre la photo</button>
          <button id="btn-add-photo">+ Photo additionnelle</button>
        </div>
        <span id="lien-meme-coupe" style="display:none">＋ Même coupe (plusieurs sacs)</span>
        <div id="dup-badge"><span id="dup-badge-text"></span></div>
        <!-- Card résultat scan -->
        <div class="card-group">
          <div class="card-group-title">Résultat du scan</div>
          <div class="field"><label>Coupe</label>
            <input type="text" id="f-coupe" placeholder="ex: Ribeye, Filet mignon…"></div>
          <div class="field"><label>Poids</label>
            <input type="text" id="f-poids" placeholder="ex: 0.823 kg"></div>
        </div>
        <div class="card-group">
          <div class="card-group-title">Prix</div>
          <div class="field"><label>Prix / kg ($)</label>
            <input type="number" id="f-prix-kg" step="0.01" placeholder="ex: 89.24"></div>
          <div class="field"><label>Prix total ($)</label>
            <input type="number" id="f-total" step="0.01" placeholder="ex: 73.44"></div>
        </div>
        <div class="card-group">
          <div class="card-group-title">Traçabilité</div>
          <div class="field"><label>Meilleur avant</label>
            <input type="date" id="f-mb"></div>
        </div>
      </div>

    </div><!-- /panel-scanner -->

    <!-- ══ STOCK ══ -->
    <div id="panel-stock" class="panel">
      <div id="stock-header">
        <span id="stock-title">Inventaire en direct</span>
        <button id="btn-refresh">↺ Actualiser</button>
      </div>
      <div id="stock-body">
        <div class="empty-state"><div>📦</div>Chargement…</div>
      </div>
    </div>

    <!-- ══ AGENT ══ -->
    <div id="panel-agent" class="panel">
      <div id="chat-messages">
        <div class="msg system">Agent Lassonde · français québécois</div>
      </div>
      <div id="chat-input-wrap">
        <form id="chat-form">
          <textarea id="chat-input" rows="1" placeholder="Quel est le stock de filet mignon ?"></textarea>
          <button type="submit" id="btn-send">↑</button>
        </form>
      </div>
    </div>

  </div><!-- /content -->

  <nav id="tabs">
    <button class="tab active" data-tab="scanner"><span class="tab-icon">📷</span>Scanner</button>
    <button class="tab" data-tab="stock"><span class="tab-icon">📦</span>Stock</button>
    <button class="tab" data-tab="agent"><span class="tab-icon">💬</span>Agent</button>
  </nav>

</div>

<!-- Barre d'actions flottante (visible seulement en mode formulaire) -->
<div id="form-actions">
  <button id="btn-restart">↺ Recommencer</button>
  <button id="btn-correct">✎ Corriger</button>
  <button id="btn-confirm">✓ Confirmer</button>
</div>
<div id="cam-flash"></div>

<!-- Modal : même coupe -->
<div id="modal-dup">
  <div id="modal-inner">
    <h3>Même coupe</h3>

// ══════════════════════════════════════════════════════
//  PHOTO → BASE64
// ══════════════════════════════════════════════════════
function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function compresserImage(base64) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 1200;
      const ratio = Math.min(maxW / img.width, 1);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.src = 'data:image/jpeg;base64,' + base64;
  });
}

function setIdleStatus(msg, type = '') {

async function handlePhoto(file) {
  const dataUrl = await fileToDataUrl(file);
  $('analyze-preview').src = dataUrl;
  showView('analyzing');

  try {
    const rawBase64 = dataUrl.split(',')[1];
    const base64    = await compresserImage(rawBase64);
    const mimeType  = 'image/jpeg';
    const result    = await analyzeLabel(base64, mimeType);

    if (!result || result.etiquette === false) {
      showView('idle');
      setIdleStatus('Photo illisible — recommencez', 'illisible');
      return;
    }
    populateForm(result, dataUrl);
    showView('form');
  } catch (e) {
    showView('idle');
    setIdleStatus('Erreur : ' + e.message.slice(0, 50), 'illisible');
  }
}

Si l'image ne contient PAS une étiquette de viande, réponds {"etiquette":false}.

async function analyzeLabel(base64, mimeType = 'image/jpeg') {
  const r = await fetch('/api/scan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image: base64, mimeType }),
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e?.error ?? `Scan ${r.status}`);
  }
  const d = await r.json();
  if (!d.ok) throw new Error(d.error ?? 'Erreur scan');
  return d.result;
}

function populateForm(data, photoSrc) {
  S.dupCount = 1;
  $('form-photo').src  = photoSrc;
  $('f-coupe').value   = data.coupe   || '';
  $('f-poids').value   = data.poids   || '';
  $('f-prix-kg').value = data.prix_kg != null ? data.prix_kg : '';
  $('f-total').value   = data.total   != null ? data.total   : '';
  $('f-mb').value      = data.meilleur_avant || '';

  // Détection champs suspects
  const suspects = [];
  if (!data.coupe || data.coupe.length < 3)          suspects.push('coupe');
  if (!data.poids_kg || data.poids_kg <= 0)           suspects.push('poids');
  if (!data.total || data.total <= 0)                 suspects.push('prix');
  if (!data.meilleur_avant)                           suspects.push('date');

  // Highlight champs manquants / suspects
  $('f-coupe').classList.toggle('missing',   suspects.includes('coupe') || !$('f-coupe').value);
  $('f-total').classList.toggle('missing',   suspects.includes('prix')  || !$('f-total').value);
  $('f-poids').classList.toggle('missing',   suspects.includes('poids'));
  $('f-mb').classList.toggle('missing',      suspects.includes('date'));

  // Conseils photo selon le premier champ suspect
  const CONSEILS = {
    coupe: '💡 Rapprochez-vous de l\'étiquette',
    poids: '💡 Inclinez moins le téléphone',
    prix:  '💡 Centrez le bas de l\'étiquette',
    date:  '💡 Entrez la date manuellement',
  };
  const hint = $('scan-hint');
  const retryBtns = $('scan-retry-btns');
  if (suspects.length > 0) {
    const conseil = suspects.filter(s => s !== 'date').map(s => CONSEILS[s]).find(Boolean)
                  || CONSEILS[suspects[0]];
    hint.textContent = '⚠ Ces infos semblent incorrectes — vérifiez avant de confirmer. ' + (conseil || '');
    hint.style.display = '';
    retryBtns.style.display = 'flex';
  } else {
    hint.style.display = 'none';
    retryBtns.style.display = 'none';
  }

  updateDupBadge();
}

function updateDupBadge() {

    lien.style.display  = 'none';

// ══════════════════════════════════════════════════════
//  SHOPIFY
// ══════════════════════════════════════════════════════
async function shopifyGQL(query, variables = {}) {
  const r = await fetch(SHOPIFY_GQL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Shopify-Access-Token': CFG.shopifyToken },
    body: JSON.stringify({ query, variables }),
  });
  if (!r.ok) throw new Error(`Shopify HTTP ${r.status}`);
  const j = await r.json();
  if (j.errors) throw new Error(j.errors[0]?.message ?? 'GraphQL error');
  return j.data;
}

async function createShopifyProduct(item) {
  const title = [item.coupe, item.poids !== '?' ? item.poids : null, item.meilleurAvant ? 'Exp. ' + item.meilleurAvant : null]
    .filter(Boolean).join(' — ');

  const res = await shopifyGQL(
    `mutation productCreate($input:ProductInput!){
       productCreate(input:$input){
         product{id variants(first:1){edges{node{id}}}}
         userErrors{field message}
       }
     }`,
    { input: {
      title,
      vendor: CLIENT_CONFIG.name,
      productType: 'Viande Wagyu Halal',
      tags: ['Wagyu', 'Halal', 'Scanner', item.coupe].filter(Boolean),
      status: 'ACTIVE',
      descriptionHtml: `<p><strong>${item.coupe}</strong></p>`
        + `<p>Poids : ${item.poids} · Prix/kg : ${item.prixKg} · Total : ${item.total ? item.total + ' $' : '?'}</p>`
        + (item.meilleurAvant ? `<p>Exp. : ${item.meilleurAvant}</p>` : '')
        + `<p><em>Scanné · ${CLIENT_CONFIG.name}</em></p>`,
    }},
  );

  if (res.productCreate.userErrors.length) throw new Error(res.productCreate.userErrors[0].message);

  const prod  = res.productCreate.product;
  const varId = prod.variants.edges[0]?.node?.id;
  if (varId && item.total) {
    await shopifyGQL(
      `mutation productVariantsBulkUpdate($productId:ID!,$variants:[ProductVariantsBulkInput!]!){
         productVariantsBulkUpdate(productId:$productId,variants:$variants){
           productVariants{id} userErrors{field message}
         }
       }`,
      { productId: prod.id, variants: [{
        id: varId,
        price: parseFloat(item.total).toFixed(2),
        inventoryPolicy: 'DENY',
        taxable: true,
        inventoryItem: { requiresShipping: true },
      }]},
    );
  }
  return prod;
}

// ══════════════════════════════════════════════════════
//  CONFIRMER — créer dans Shopify, retour à idle
// ══════════════════════════════════════════════════════
async function confirmItems() {
  // Validation
  let valid = true;
  ['f-coupe', 'f-total'].forEach(id => {
    const empty = !$(id).value.trim();
    $(id).classList.toggle('missing', empty);
    if (empty) valid = false;
  });
  if (!valid) { toast('Remplir les champs en orange avant de confirmer', 3000); return; }

  const form  = readForm();
  const count = S.dupCount;

  $('btn-confirm').disabled = true;
  showLoader(count > 1 ? `Envoi de ${count} sacs…` : 'Envoi…');

  let ok = 0, fail = 0, lastErr = '';
  for (let i = 0; i < count; i++) {
    try {
      $('loader-text').textContent = `${i + 1}/${count} — ${form.coupe}…`;
      const payload = {
        coupe:         form.coupe,
        poids_kg:      parseFloat(form.poids)    || 0,
        prix_kg:       parseFloat(form.prixKg)   || 0,
        prix_total:    parseFloat(form.total)    || 0,
        meilleur_avant: form.meilleurAvant || null,
      };
      const r = await fetch('/api/inventaire', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const d = await r.json();
      if (!r.ok || !d.ok) throw new Error(d.error ?? `HTTP ${r.status}`);
      S.sessionItems.push({ ...form });
      ok++;
    } catch (e) { fail++; lastErr = e.message; }
    if (i < count - 1) await pause(700);
  }

  hideLoader();
  $('btn-confirm').disabled = false;
  updateCounter();

  const msg = ok
    ? `✓ ${ok} sac${ok > 1 ? 's' : ''} enregistré${ok > 1 ? 's' : ''}` + (fail ? ` · ${fail} erreur(s)` : '')
    : `Erreur : ${lastErr.slice(0, 80)}`;
  toast(msg, 3500);

  S.dupCount = 1;
  showView('idle');
}

// ══════════════════════════════════════════════════════
//  STOCK TAB — lit /api/inventaire (DB locale) + fallback Shopify
// ══════════════════════════════════════════════════════
async function loadAndRenderStock() {
  const body = $('stock-body');
  body.innerHTML = '<div class="empty-state"><div>⏳</div>Chargement…</div>';
  try {
    // Essayer d'abord la DB locale
    const r = await fetch('/api/inventaire?statut=disponible').catch(() => null);
    if (r && r.ok) {
      const data = await r.json();
      renderLocalStock(data.items || []);
      return;
    }
    // Fallback Shopify si pas de serveur local
    await loadShopifyStock(body);
  } catch (e) {
    body.innerHTML = `<div class="empty-state"><div>⚠️</div>${e.message}</div>`;
  }
}

function renderLocalStock(items) {
  const body = $('stock-body');
  if (!items.length) {
    body.innerHTML = '<div class="empty-state"><div>📦</div>Aucun sac disponible — scanner pour commencer</div>';
    return;
  }

  // Grouper par coupe
  const grouped = {};
  for (const item of items) {
    const k = item.coupe || 'Autre';
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(item);
  }

  const totalVal = items.reduce((s, i) => s + (i.prix_total || 0), 0);
  const summary  = `<div style="background:var(--surface);border-radius:8px;padding:12px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-family:sans-serif;font-size:12px;color:var(--muted)">${items.length} sac${items.length>1?'s':''} disponibles</div>
    <div style="font-size:16px;color:var(--gold)">${totalVal.toFixed(2)} $</div>
  </div>`;

  const sections = Object.keys(grouped).sort();
  body.innerHTML = summary + sections.map(coupe => `
    <div class="stock-section">
      <div class="stock-section-title">${coupe} <span style="color:var(--muted);font-weight:normal">(${grouped[coupe].length})</span></div>
      ${grouped[coupe].map(item => `
        <div class="stock-item">
          <div>
            <div class="stock-item-name">${item.coupe}</div>
            <div class="stock-item-sku">${item.poids_kg.toFixed(3)} kg · exp. ${item.meilleur_avant || '?'}</div>
          </div>
          <div style="text-align:right">
            <div class="stock-item-price">${item.prix_total.toFixed(2)} $</div>
            <div style="font-size:10px;color:var(--muted);font-family:sans-serif">${item.prix_kg.toFixed(2)} $/kg</div>
            <span class="stock-badge badge-ok">Disponible</span>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

async function loadShopifyStock(body) {
  const products = [];
  let cursor = null, hasNext = true;
  while (hasNext) {
    const d = await shopifyGQL(
      `query($c:String){products(first:50,after:$c){pageInfo{hasNextPage endCursor}
         edges{node{id title productType variants(first:1){edges{node{price sku inventoryQuantity}}}}}}}`,
      { c: cursor },
    );
    for (const e of d.products.edges) products.push(e.node);
    hasNext = d.products.pageInfo.hasNextPage;
    cursor  = d.products.pageInfo.endCursor;
  }
  S.products = products;
  if (!products.length) { body.innerHTML = '<div class="empty-state"><div>📦</div>Aucun produit</div>'; return; }
  const grouped = {};
  for (const p of products) { const t = p.productType || 'Autre'; (grouped[t] = grouped[t] || []).push(p); }
  body.innerHTML = Object.keys(grouped).map(sec => `
    <div class="stock-section">
      <div class="stock-section-title">${sec}</div>
      ${grouped[sec].map(p => {
        const v = p.variants.edges[0]?.node; const qty = v?.inventoryQuantity ?? 0;
        return `<div class="stock-item">
          <div><div class="stock-item-name">${p.title}</div><div class="stock-item-sku">${v?.sku||''}</div></div>
          <div style="text-align:right">
            <div class="stock-item-price">${v?.price??'?'} $</div>
            <span class="stock-badge ${qty>0?'badge-ok':'badge-zero'}">${qty>0?qty+' en stock':'Épuisé'}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function appendMsg(role, text) {
  const m = $('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = text.replace(/\n/g, '<br>');
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
  return d;
}

async function sendChat(msg) {
  S.chatHistory.push({ role: 'user', content: msg });
  const r = await fetch('/api/agent', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, historique: S.chatHistory.slice(0, -1) }),
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e?.error ?? `Agent ${r.status}`); }
  const data  = await r.json();
  const reply = data.reponse ?? '(vide)';
  S.chatHistory.push({ role: 'assistant', content: reply });
  if (S.chatHistory.length > 20) S.chatHistory.splice(0, 2);
  return { reply, webSearch: !!data.web_search };
}

      const r    = await fetch('/api/scan', { method:'POST', headers:{'Content-Type':'application/json'},
                                body: JSON.stringify({ image: base64, mimeType: 'image/jpeg' }) });
      const d    = await r.json();
      const data = d.result || {};
      // Complète seulement les champs vides
      if (data.coupe         && !$('f-coupe').value)    $('f-coupe').value   = data.coupe;
      if (data.poids         && !$('f-poids').value)    $('f-poids').value   = data.poids;
      if (data.prix_kg       && !$('f-prix-kg').value)  $('f-prix-kg').value = data.prix_kg;
      if (data.total         && !$('f-total').value)    $('f-total').value   = data.total;
      if (data.meilleur_avant && !$('f-mb').value)      $('f-mb').value      = data.meilleur_avant;
      // Recalcule les hints
      populateForm({
        coupe:         $('f-coupe').value,
        poids_kg:      parseFloat($('f-poids').value) || 0,
        total:         parseFloat($('f-total').value) || 0,
        meilleur_avant: $('f-mb').value || null,
      }, $('form-photo').src);
      showView('form');
    } catch (_) { showView('form'); toast('Photo additionnelle non lue — vérifiez manuellement', 3000); }
  });
  tmp.click();
});

['f-coupe', 'f-total'].forEach(id => {
  $(id).addEventListener('input', () => $(id).classList.toggle('missing', !$(id).value.trim()));
});

$('chat-form').addEventListener('submit', async e => {
  e.preventDefault();
  const inp = $('chat-input'); const msg = inp.value.trim(); if (!msg) return;
  inp.value = ''; inp.style.height = 'auto';
  appendMsg('user', msg); $('btn-send').disabled = true;
  // Typing indicator animé
  const m = $('chat-messages');
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-indicator';
  typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  m.appendChild(typingEl); m.scrollTop = m.scrollHeight;
  try {
    const { reply, webSearch } = await sendChat(msg);
    typingEl.remove();
    const msgEl = appendMsg('agent', reply.replace(/\n/g, '<br>'));
    if (webSearch) {
      const badge = document.createElement('div');
      badge.className = 'web-badge';
      badge.innerHTML = '🔍 Vérifié sur internet';
      msgEl.appendChild(badge);
    }
  } catch (e) {
    typingEl.remove();
    appendMsg('agent', `<em style="color:var(--red)">${e.message}</em>`);
  }
  finally { $('btn-send').disabled = false; $('chat-messages').scrollTop = 999999; }
});
$('chat-input').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
(async function init() {
  document.documentElement.style.setProperty('--gold', CLIENT_CONFIG.accentColor);
  document.documentElement.style.setProperty('--bg',   CLIENT_CONFIG.bgColor);
  document.getElementById('header-name').textContent = CLIENT_CONFIG.name;
  document.title = CLIENT_CONFIG.name + ' · Scanner';

  // Charger les credentials depuis /config (injectés par server.js depuis les env vars)
  try {
    const r = await fetch('/config');
    if (r.ok) {
      const c = await r.json();
      if (c.anthropicKey)   CFG.anthropicKey   = c.anthropicKey;
      if (c.shopifyStore)   CFG.shopifyStore   = c.shopifyStore;
      if (c.shopifyToken)   CFG.shopifyToken   = c.shopifyToken;
      if (c.shopifyVersion) CFG.shopifyVersion = c.shopifyVersion;
    }
  } catch (_) {
    // Fichier ouvert directement sans server.js — CFG garde ses valeurs par défaut
  }

  updateCounter();
  showView('idle');
  appendMsg('agent', `Bonjour ! Je suis l'agent ${CLIENT_CONFIG.name}. Chargez le stock dans l'onglet Stock, puis posez-moi vos questions.`);
})();
</script>
